name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.14.1'
          cabal-version: '3.14'

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('krill.cabal', 'cabal.project') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
